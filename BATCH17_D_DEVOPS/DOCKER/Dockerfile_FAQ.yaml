18. What are layers in Docker Image?
A: Layers in a Docker image are the individual components that make up the image. Each instruction in a Dockerfile creates a new layer, and these layers are stacked on top of each other to form the final image.
   
   to see the layers of a Docker image, you can use the docker history command followed by the image name or ID. This will show you a list of all the layers in the image, along with their sizes and the commands that created them.

   docker history <image_name_or_id>

19. Which instructions in Dockerfile create new image layers?
A: In a Dockerfile, the following instructions create new image layers:
   - FROM: This instruction creates the base layer for the image.
   - RUN: Each RUN instruction creates a new layer that includes the changes made by the command executed in that instruction.
   - COPY: This instruction creates a new layer that includes the files copied from the host machine to the image.
   - ADD: Similar to COPY, this instruction creates a new layer that includes the files added to the image, and it can also extract compressed files or download files from URLs.

   Other instructions like WORKDIR, ENV, ARG, EXPOSE, CMD, ENTRYPOINT, and  do not create new layers; they modify the existing layers or add metadata to the image without creating additional layers.

20. Is it good practice to use multiple RUN instructions in Dockerfile?
A:  No, it is generally not considered good practice to use multiple RUN instructions in a Dockerfile. 
    Each RUN instruction creates a new layer in the Docker image, which can lead to larger image sizes and slower build times. 
    Instead, it is recommended to combine related commands into a single RUN instruction using && to chain them together. 
    This helps reduce the number of layers and can improve the efficiency of the build process, resulting in smaller and faster Docker images.

