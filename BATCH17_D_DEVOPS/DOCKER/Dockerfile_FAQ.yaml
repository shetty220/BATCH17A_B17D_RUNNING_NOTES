    You can specify which Dockerfile to use when building the image by using the -f or --file option with the docker build command.


14. What does "." (dot) mean in Docker build command?
A: In the Docker build command, the "." (dot) represents the build context. 
   The build context is the directory that contains the Dockerfile and any other files that are needed for building the Docker image. 
   When you run docker build ., it tells Docker to use the current directory as the build context. 
   Docker will look for a Dockerfile in that directory and use it to build the image, while also having access to any files in that directory that are referenced in the Dockerfile. 
   You can also specify a different directory as the build context by providing a path instead of ".", such as docker build /path/to/context.

15. What is build context in Docker?
A: The build context in Docker refers to the set of files and directories that are accessible to the Docker daemon during the image build process. 
   When you run the docker build command, you specify a directory as the build context (e.g., docker build .), and Docker will use that directory and its contents as the context for building the image. 
   The Dockerfile can reference files within the build context using instructions like COPY or ADD, allowing you to include necessary files in the resulting Docker image. 
   It's important to keep the build context as small as possible by using a .dockerignore file to exclude unnecessary files, which can help speed up the build process and reduce the size of the final image.

